creator_config:
  min_total_coins: 0
  max_total_coins: 1000

  min_median_market_cap: 90.0
  min_trader_pnl_average: 4.0
  min_total_holders_average: 50.0
  min_average_volume: 90.0
  min_median_total_trades: 50.0

  min_average_unique_buy_to_sell_ratio: 0
  min_average_buy_trader_size: 0

ws_port: 1661
http_port: 1662
start_balance_sol: 10.0

buy_config:
  # Operator / GUI buy cap (seed + PUT /buy-size). Never below max tier size so A+ is not clipped.
  amount_sol: 0.4
  tp1_pct: 30.0
  tp1_sell_pct: 30.0
  tp2_pct: 50.0
  tp2_sell_pct: 50.0
  tp3_pct: 100.0
  tp3_sell_pct: 10.0
  tp4_pct: 150.0
  tp4_sell_pct: 10.0
  tp5_pct: 200.0
  tp5_sell_pct: 10.0
  exit_profit_floor: -16.0
  # SL: require N consecutive ticks (100ms) with filtered mcap PnL <= floor.
  sl_confirm_ticks: 3
  # SL: no stop-loss for this many seconds after entry (V4 decay grace is separate).
  sl_grace_secs: 5
  # Median filter on bonding-curve mcap for exit decisions (ring length in ticks).
  exit_mcap_median_ticks: 5
  exit_mcap_band_low_ratio: 0.02
  exit_mcap_band_high_ratio: 50.0
  # Fixed window when time_kill_adaptive: false. When adaptive (V3), weak/neutral/strong
  # seconds below are used instead (this value is ignored for the timer).
  time_kill_secs: 25
  time_kill_min_profit_pct: 10.0
  # --- Adaptive time kill (V3): weak launch ~20–25s, strong ~45–70s -----------------
  time_kill_adaptive: true
  time_kill_weak_secs: 22
  time_kill_strong_secs: 60
  time_kill_neutral_secs: 32
  time_kill_strong_min_buyers: 38
  time_kill_strong_min_b2s: 4.5
  time_kill_weak_max_buyers: 28
  time_kill_weak_max_b2s: 3.0
  # % of entry mcap per second (same scale as PnL velocity on bonding curve).
  time_kill_vel_strong: 0.06
  time_kill_vel_flat: 0.025
  time_kill_early_green_pct: 8.0
  time_kill_peak_dd_for_weak: 0.055
  trailing_stop_drawdown_pct: 26.0
  # After buy: if on-chain post-fill mcap > score_mcap * ratio, sell immediately (no OPEN).
  fill_mcap_abort_enabled: true
  fill_mcap_abort_max_ratio: 2.0

  # Adaptive Exit Engine V4 (full doc): FSM phases, live tape, HOLD, staircase, decay.
  exit_v4:
    enabled: true
    live_score_refresh_secs: 3
    # No decay exit / Distribution phase until held this long (SL floor still active).
    # 12s was too slow on fast dumps (e.g. BrS69Z); 3s allows decay after entry settles.
    exit_grace_secs: 3
    hold_min_live_score: 13
    hold_min_b2s: 2.2
    hold_min_smart: 5
    hold_max_bundle_similar: 0.35
    hold_momentum_overheated_pct: 55.0
    phase_momentum_min_score: 5
    phase_expansion_min_score: 10
    phase_distribution_max_score: 2
    # Full exit on decay only after N consecutive ticks with real decay signal.
    momentum_decay_confirm_ticks: 2
    strong_time_kill_min_profit_after_tp: 8.0
    momentum_decay_exit_enabled: true
    profit_staircase_enabled: true
    runtime_runner_upgrade_enabled: true
    runner_upgrade_min_live_score: 11
    re_expansion_enabled: true
    re_expansion_min_score: 8
    re_expansion_min_profit_pct: 20.0
    adaptive_moonbag_enabled: true
    bundle_similar_tolerance: 0.08
    weak:
      tp1_pct: 30.0
      tp1_sell_pct: 40.0
      tp2_pct: 50.0
      tp2_sell_pct: 40.0
      trailing_stop_drawdown_pct: 14.0
      trailing_activate_profit_pct: 50.0
      trailing_floor_profit_pct: 15.0
    neutral:
      tp1_pct: 30.0
      tp1_sell_pct: 35.0
      tp2_pct: 50.0
      tp2_sell_pct: 25.0
      trailing_stop_drawdown_pct: 20.0
      trailing_activate_profit_pct: 60.0
    strong:
      tp1_pct: 30.0
      tp1_sell_pct: 30.0
      tp2_pct: 50.0
      tp2_sell_pct: 15.0
      tp3_pct: 100.0
      tp3_sell_pct: 10.0
      tp4_pct: 150.0
      tp4_sell_pct: 10.0
      trailing_stop_drawdown_pct: 24.0
      trailing_activate_profit_pct: 60.0
      trailing_floor_profit_pct: 35.0
    runner:
      tp1_pct: 50.0
      tp1_sell_pct: 10.0
      tp2_pct: 80.0
      tp2_sell_pct: 10.0
      tp3_pct: 150.0
      tp3_sell_pct: 15.0
      tp4_pct: 300.0
      tp4_sell_pct: 15.0
      tp5_pct: 400.0
      tp5_sell_pct: 10.0
      trailing_stop_drawdown_pct: 38.0
      trailing_activate_profit_pct: 55.0
      trailing_floor_profit_pct: 30.0

# Score Engine A+/A/SKIP. The bot computes a combined score from dev quality,
# liquidity, buyers, momentum, volume, smart wallets, and anti-bundle signals
# after a short scoring window, then chooses a tier-based buy size.
scoring:
  # TEMP A/B vs entry-filter V2: true = legacy engine (overheated-before-good
  # momentum, bundle_identical then bundle_similar, smart 3+/1+ fixed, YAML
  # thresholds only — learning merge not applied to snapshot/score). Set false
  # to restore V2 scoring path.
  legacy_scoring: true
  # Longer window so mcap_now can diverge from mcap_init (momentum signal).
  scoring_window_ms: 5500
  # Sub-samples inside scoring_window_ms: new buyers/sell tape per slice (>=2 recommended).
  # Stops early when peak mcap vs first sample hits momentum_good_low_pct (fast pump).
  buyer_velocity_slices: 3
  a_plus_threshold: 9
  # Pre-V2 default was 6 (V2 experiment used 7–8).
  a_threshold: 6
  # --- Live-only gates (ignored when execution.mode: demo) ---------------
  # Require bonding-curve mcap growth into the "good" band during the window.
  require_momentum_good: true
  # Live: tier must be at least this. Use `A` so both A and A+ can buy when
  # `require_momentum_good` passes; set `APlus` only if you want top-tier-only.
  minimum_tier_for_buy: A
  weights:
    dev_history_strong: 4
    dev_history_weak: 2
    dev_ranker_a_plus: 3
    dev_ranker_a: 1
    dev_ranker_bad: -3
    smart_wallets_3plus: 4
    smart_wallets_1plus: 1
    buyers_10plus: 2
    buyers_6plus: 1
    buyers_below_3: -2
    buy_to_sell_ratio_high: 1
    momentum_good: 2
    momentum_overheated: -3
    volume_ok: 1
    bundle_similar: -4
    bundle_identical: -5
    # Early-window tape (V3): buyer cadence + sell pressure / absorb / dumps
    buyer_velocity_persistent: 1
    buyer_velocity_fading: -2
    sell_pressure_high: -2
    absorb_strong: 2
    smart_early_exit_dump: -2
    repeat_dump_penalty: -1
  thresholds:
    dev_strong_min_coins: 5
    dev_strong_min_pnl_pct: 20.0
    buyers_high: 10
    buyers_mid: 6
    buyers_low: 4
    buy_to_sell_high: 1.7
    # Legacy: low band 4% (pre-V2). V2 A/B used 12% — set back to 12.0 when legacy_scoring: false.
    # momentum_good uses peak mcap in window vs first sample (not end-only).
    momentum_good_low_pct: 3.0
    momentum_good_high_pct: 30.0
    momentum_overheated_pct: 55.0
    volume_ok_sol: 12.0
    smart_wallet_3plus_min: 4
    smart_wallet_1plus_min: 1
    bundle_similar_ratio: 0.7
    bundle_identical_ratio: 0.5
    # Legacy default 0.05 (V2 used 0.10 for similar-cluster sensitivity).
    bundle_similar_tolerance: 0.05
  size:
    a_plus_sol: 0.4
    # Tier A: smaller than A+; operator cap must be >= a_plus_sol (see buy_config.amount_sol).
    a_sol: 0.3

# Strategy controller — risk caps applied at the InitiateBuy gate inside the
# position manager. None of these touch open positions.
strategy:
  max_open_positions: 3
  max_trades_per_day: 25
  max_daily_loss_sol: -2.0
  daily_profit_lock_sol: 4.0
  loss_streak_limit: 5
  loss_streak_pause_secs: 1800
  market_regime_pause: true
  market_regime_window: 10
  market_regime_loss_ratio: 0.8
  market_regime_pause_secs: 1800

# Persistent JSON state for dev_ranker and smart_money. Both are flushed
# atomically via tmp+rename every flush_every_secs.
persistence:
  dev_ranker_path: "/home/automata/state/dev_ranker.json"
  smart_money_path: "/home/automata/state/smart_money.json"
  learning_overrides_path: "/home/automata/state/learning_overrides.json"
  flush_every_secs: 30
  entity_ttl_secs: 172800

# Self-learning: logs closed trades + skipped mints to Postgres; periodically
# nudges scoring thresholds (merged at runtime, max ~±15% via merge clamps).
learning:
  enabled: true
  analyze_every_trades: 100
  analyze_interval_secs: 3600
  min_trades_for_update: 30

# Execution mode. Default: live (SolanaBroker). Demo = MockBroker (simulated).
# Live reads wallet from PRIVATE_KEY env, mainnet RPC from SOLANA_RPC_URL
# (or SOLANA_HTTP) env, and routes real buy/sell tx with the knobs below.
execution:
  mode: live            # demo | live
  live:
    slippage_bps: 500                   # 5%
    priority_fee_micro_lamports: 200000 # per CU (0 disables)
    compute_unit_limit: 200000          # 0 keeps cluster default
    max_retries: 3
    balance_refresh_secs: 10
    # Helius Gatekeeper (beta.helius-rpc.com) rejects sendTransaction preflight
    # (-32602 "not supported"). Use true for that HTTP endpoint; standard
    # mainnet.helius can use false if you want RPC simulation before send.
    skip_preflight: true