creator_config:
  min_total_coins: 0
  max_total_coins: 1000
  # Early spam-dev cutoff: skip the token (before the heavy creator-stats query)
  # if the dev has launched more than this many coins. Checked with a cheap
  # capped count. Such prolific devs are almost always spam/serial ruggers.
  spam_skip_coins: 100
  # Prolific devs with strong runners in spam_dev audit (peak >= ~100 SOL after A-tier cut).
  # Whitelisted: normal creator_config + scoring (no -3 penalty, no A+-only gate).
  spam_dev_whitelist:
    - CXoUJHtBGnuNR6zJ3zm8nTnNzCwXxFViXh29d1kTJQmK  # 4eNxx4… peak 168
    - FaBGrHWjcJ8vKnbgUtsdpZjvF7YAAajtQTWmmEHiKtQr  # FgE8uN… peak 157
    - 8oZiaf74SwU9YufXNWHHZj6kih6RrqaZ3T38exYD27jw  # 62yzXq… peak 138
    - 745teG6MW6McgMbeQHdDTgHm52tirp6ysYDm6oJ17w5k  # 6xoeR2… peak 114
    - AYjXVBtkfwNY1QbQp4gK6nbJM6fzk4fPeyLHAn1DLpFf  # DnGN5p… peak 106
    - 4HXb7ivgvjbHC3TBesmmD9LovH8tmTv9DZsq12GMvEpU  # 5SiguT… peak 105

  min_median_market_cap: 90.0
  min_trader_pnl_average: 4.0
  min_total_holders_average: 50.0
  min_average_volume: 90.0
  min_median_total_trades: 50.0

  min_average_unique_buy_to_sell_ratio: 0
  min_average_buy_trader_size: 0

ws_port: 1661
http_port: 1662
start_balance_sol: 10.0

buy_config:
  # Operator / GUI buy cap (seed + PUT /buy-size). Never below max tier size so A+ is not clipped.
  amount_sol: 0.4
  tp1_pct: 30.0
  tp1_sell_pct: 30.0
  tp2_pct: 50.0
  tp2_sell_pct: 50.0
  tp3_pct: 100.0
  tp3_sell_pct: 10.0
  tp4_pct: 150.0
  tp4_sell_pct: 10.0
  tp5_pct: 200.0
  tp5_sell_pct: 10.0
  exit_profit_floor: -16.0
  # SL: require N consecutive ticks (100ms) with filtered mcap PnL <= floor.
  sl_confirm_ticks: 3
  # SL: no stop-loss for this many seconds after entry (V4 decay grace is separate).
  sl_grace_secs: 5
  # Emergency SL: instant exit, no grace/confirm/delay (min filtered vs raw PnL).
  sl_crash_pnl_pct: -28.0
  # Emergency SL: raw mcap drop % vs previous 100ms tick (catches cliff dumps).
  sl_crash_tick_drop_pct: 18.0
  # Median filter on bonding-curve mcap for exit decisions (ring length in ticks).
  exit_mcap_median_ticks: 5
  exit_mcap_band_low_ratio: 0.02
  exit_mcap_band_high_ratio: 50.0
  # At this bonding-curve mcap (SOL): partial sell + moonbag (trailing/Jupiter on remainder).
  mcap_ceiling_sol: 350.0
  mcap_ceiling_partial_sell_pct: 65.0
  # Fixed window when time_kill_adaptive: false. When adaptive (V3), weak/neutral/strong
  # seconds below are used instead (this value is ignored for the timer).
  time_kill_secs: 25
  time_kill_min_profit_pct: 10.0
  # --- Adaptive time kill (V3): weak launch ~20–25s, strong ~45–70s -----------------
  time_kill_adaptive: true
  time_kill_weak_secs: 22
  # Audit 2026-06: was 60 — strong launches need longer before TIME KILL (test 75).
  time_kill_strong_secs: 75
  time_kill_neutral_secs: 32
  time_kill_strong_min_buyers: 38
  time_kill_strong_min_b2s: 4.5
  time_kill_weak_max_buyers: 28
  time_kill_weak_max_b2s: 3.0
  # % of entry mcap per second (same scale as PnL velocity on bonding curve).
  time_kill_vel_strong: 0.06
  time_kill_vel_flat: 0.025
  time_kill_early_green_pct: 8.0
  time_kill_peak_dd_for_weak: 0.055
  trailing_stop_drawdown_pct: 26.0
  # After buy: if on-chain post-fill mcap > score_mcap * ratio, sell immediately (no OPEN).
  fill_mcap_abort_enabled: true
  fill_mcap_abort_max_ratio: 2.0
  # Abort when on-chain fill mcap is far below score-time tape (adverse curve / stale WS).
  fill_mcap_abort_min_ratio: 0.78
  # SL baseline = min(post-fill mcap, score-time mcap) so the stop measures real
  # market downside, not our own buy's price impact / post-fill inflation.
  honest_entry_baseline: true
  # Lower bound for the honest baseline as a fraction of post-fill mcap. On a big
  # fill/score gap (hard spike during our buy) this keeps the SL baseline from
  # dropping so low it disables the stop. 1.0 = no honest adjustment.
  honest_entry_baseline_min_ratio: 0.85
  # Stagger BETWEEN wallets on fan-out (ms). First wallet fires immediately; each
  # subsequent wallet waits this long to avoid RPC/blockhash collisions. 0 = all at once.
  buy_fanout_delay_ms: 150
  # exit_v4 live tape refresh: min interval per open mint (ms); Tick is every 100ms.
  exit_v4_live_snapshot_interval_ms: 500

curve_quarantine:
  enabled: true
  cooldown_secs: 86400
  min_mcap_sol_divergence_pct: 35.0
  max_pnl_sol_pct: -10.0
  sl_crash_false_positive_min_filt_pnl: 10.0
  sl_crash_false_positive_max_raw_pnl: 5.0

  # Adaptive Exit Engine V4 (full doc): FSM phases, live tape, HOLD, staircase, decay.
  exit_v4:
    enabled: true
    live_score_refresh_secs: 3
    # Entry stabilization (doc 6.1): no decay/phase downgrade until tier grace elapses.
    # SL / SL CRASH unchanged (sl_grace_secs). Fallback when tier fields are 0.
    exit_grace_secs: 8
    exit_grace_secs_tier_a: 14
    exit_grace_secs_tier_a_plus: 19
    # Early impulse: while mcap is green, distribution-only decay waits for recovery.
    decay_early_hold_secs: 25
    decay_early_mcap_profit_min_pct: 9.0
    decay_early_extra_confirm_ticks: 1
    # A+: no TIME KILL before min_secs; skip while mcap PnL green (SL still active).
    # Audit 2026-06: was 50 — reduce premature A+ TIME KILL (test 70).
    a_plus_time_kill_min_secs: 70
    a_plus_time_kill_mcap_profit_min_pct: 5.0
    # Tier A + momentum_good + mcap still green: no weak TIME KILL at ~22s (floor 50s).
    tier_a_time_kill_defer_min_secs: 50
    tier_a_time_kill_defer_mcap_min_pct: 0.0
    # Multi-tick confirmed deterioration (doc 6.3/6.4): consecutive weak ticks before
    # a MOMENTUM DECAY full exit; 1 = legacy single-tick.
    decay_confirm_ticks: 3
    # Drawdown from local high (%) that marks a flush and opens recovery scoring (doc 4/5).
    flush_drop_pct: 18.0
    # Recovery score at/above this during a flush = healthy pullback -> hold (doc 5.1/6.5).
    recovery_min_score: 8
    hold_min_live_score: 13
    hold_min_b2s: 2.2
    hold_min_smart: 5
    hold_max_bundle_similar: 0.35
    hold_momentum_overheated_pct: 55.0
    phase_momentum_min_score: 5
    phase_expansion_min_score: 10
    phase_distribution_max_score: 3
    strong_time_kill_min_profit_after_tp: 8.0
    momentum_decay_exit_enabled: true
    profit_staircase_enabled: true
    runtime_runner_upgrade_enabled: true
    runner_upgrade_min_live_score: 11
    re_expansion_enabled: true
    re_expansion_min_score: 8
    re_expansion_min_profit_pct: 20.0
    adaptive_moonbag_enabled: true
    bundle_similar_tolerance: 0.08
    weak:
      tp1_pct: 30.0
      tp1_sell_pct: 40.0
      tp2_pct: 50.0
      tp2_sell_pct: 40.0
      trailing_stop_drawdown_pct: 14.0
      trailing_activate_profit_pct: 50.0
      trailing_floor_profit_pct: 15.0
    neutral:
      tp1_pct: 30.0
      tp1_sell_pct: 35.0
      tp2_pct: 50.0
      tp2_sell_pct: 25.0
      trailing_stop_drawdown_pct: 20.0
      trailing_activate_profit_pct: 60.0
    strong:
      tp1_pct: 30.0
      tp1_sell_pct: 30.0
      tp2_pct: 50.0
      tp2_sell_pct: 15.0
      tp3_pct: 100.0
      tp3_sell_pct: 10.0
      tp4_pct: 150.0
      tp4_sell_pct: 10.0
      trailing_stop_drawdown_pct: 24.0
      trailing_activate_profit_pct: 60.0
      trailing_floor_profit_pct: 35.0
    runner:
      tp1_pct: 50.0
      tp1_sell_pct: 10.0
      tp2_pct: 80.0
      tp2_sell_pct: 10.0
      tp3_pct: 150.0
      tp3_sell_pct: 15.0
      tp4_pct: 300.0
      tp4_sell_pct: 15.0
      tp5_pct: 400.0
      tp5_sell_pct: 10.0
      trailing_stop_drawdown_pct: 38.0
      trailing_activate_profit_pct: 55.0
      trailing_floor_profit_pct: 30.0

# Score Engine A+/A/SKIP. The bot computes a combined score from dev quality,
# liquidity, buyers, momentum, volume, smart wallets, and anti-bundle signals
# after a short scoring window, then chooses a tier-based buy size.
scoring:
  # TEMP A/B vs entry-filter V2: true = legacy engine (overheated-before-good
  # momentum, bundle_identical then bundle_similar, smart 3+/1+ fixed, YAML
  # thresholds only — learning merge not applied to snapshot/score). Set false
  # to restore V2 scoring path.
  legacy_scoring: true
  # Longer window so mcap_now can diverge from mcap_init (momentum signal).
  scoring_window_ms: 5500
  # Sub-samples inside scoring_window_ms: new buyers/sell tape per slice (>=2 recommended).
  # Stops early when peak mcap vs first sample hits momentum_good_low_pct (fast pump).
  buyer_velocity_slices: 3
  # Audit 2026-06 A/B: was 9 — A+ underperformed A; stricter tier (revert to 9 for control).
  a_plus_threshold: 10
  # Pre-V2 default was 6 (V2 experiment used 7–8).
  a_threshold: 6
  # --- Live-only gates (ignored when execution.mode: demo) ---------------
  # Require bonding-curve mcap growth into the "good" band during the window.
  require_momentum_good: true
  # Strong smart-money count that bypasses require_momentum_good (smart money is
  # itself a momentum signal; let such tokens reach the continuation layer). 0 = off.
  momentum_good_smart_bypass: 2
  # A+ ONLY: a top-tier (A+) token with >= this many smart wallets bypasses
  # require_momentum_good and proceeds to continuation/parabolic. Stricter-scoped
  # than momentum_good_smart_bypass: weak A (score 6-7, smart=0) is NOT loosened.
  # 0 = off. Gives strong A+ smart setups a chance instead of an early cut.
  momentum_good_aplus_smart_bypass: 1
  # Strong tier-A without smart: score>=8, strong buyers/volume/absorb/velocity.
  # Weak A (score 6-7) still requires momentum_good. Continuation gate unchanged.
  momentum_good_strong_a:
    enabled: true
    min_score: 8
    min_buyers: 8
    min_buy_volume_sol: 8.0
    min_buy_to_sell_ratio: 1.7
    require_absorb_strong: true
    min_absorb_quality: 0.58
    require_buyer_velocity_persistent: true
    min_buyer_velocity_persistence: 0.62
  # Live: tier must be at least this. Use `A` so both A and A+ can buy when
  # `require_momentum_good` passes; set `APlus` only if you want top-tier-only.
  minimum_tier_for_buy: A
  # Spam-dev handling: devs with > creator_config.spam_skip_coins launches skip
  # the heavy creator-stats SQL (perf) but are NOT banned. Instead they get this
  # scoring penalty and may only buy at A+ (their tape must be exceptional), so
  # rare real runners from prolific devs survive while the trash is dropped.
  spam_dev_penalty: -3
  spam_dev_require_a_plus: true
  # Anti-rug: block one-sided low-fee pumps before buy; tighten tape score items.
  anti_rug:
    enabled: true
    # TEMP: hard pre-buy gate off — scoring tightenings stay on (A/B vs 8 near-miss tokens).
    entry_gate_enabled: false
    min_sell_volume_window_sol: 2.0
    min_fee_flow_ratio: 0.08
    min_sell_pressure_score: 0.05
    min_buy_volume_for_gates_sol: 8.0
    absorb_strong_min_sell_vol_sol: 1.5
    buy_to_sell_max_without_min_sell_vol: 12.0
    buy_to_sell_min_sell_vol_sol: 3.0
    buyer_velocity_min_slices: 2
    low_mcap_peak_sol: 90.0
    low_mcap_min_buy_volume_sol: 25.0
  # Continuation Validation Layer (doc 2.1/2.2/2.3): after score+gates pass, poll
  # one short confirm window and abort transient / fake-momentum entries. Ships
  # dark (enabled: false). Live mode only.
  continuation:
    enabled: true
    confirm_window_ms: 1500
    # Need at least (min_upticks + 1) slices, else the uptick check can never pass.
    confirm_slices: 4
    min_upticks: 1
    min_new_unique_buyers: 1
    max_b2s_drop_ratio: 0.6
    max_sell_absorption_ratio: 1.5
    min_buys_per_sec: 0.0
    # Strong setups (A+ or score>=10): second-look on cont_b2s_worsening / cont_sell_absorption;
    # A+ also on cont_no_uptick (dip-then-rip). Other cont reasons unchanged.
    # NOTE: second_look and aplus_peak_guard below run only when continuation.enabled is true.
    second_look:
      enabled: true
      wait_ms: 1250
      recheck_window_ms: 1200
      recheck_slices: 3
      min_score: 10
    # A+ without smart at high local peak: never buy on one weak confirm pass alone.
    aplus_peak_guard:
      enabled: true
      near_peak_ratio: 0.97
      min_mcap_sol: 90.0
      strong_upticks: 2
      strong_new_buyers: 2
      # Block buy after recheck if mcap collapsed vs score peak (5LkxnE-style).
      recheck_min_vs_peak_ratio: 0.78
  # Weak tier-A: no smart, score≤7, neutral/weak dev — hard-skip on dump tape or vol<12 SOL;
  # survivors must pass continuation (+ second-look up to score 7).
  weak_a_gate:
    enabled: true
    max_score: 7
    max_smart_wallets: 0
    min_buy_volume_sol: 8.0
    block_repeat_dump_slices_ge: 1
    block_dev_neutral: true
    block_dev_history_weak: true
    continuation_second_look_max_score: 7
    # Hard skip: tier-A + dev_history_weak + smart=0 + b2s>10 + sell_vol<2 (synthetic pump).
    synthetic_pump:
      enabled: true
      buy_to_sell_ratio_gt: 10.0
      sell_volume_window_sol_lt: 2.0
  # Anti-parabolic peak gate: skip weak A-tier entries with no smart money bought
  # at the local peak unless the confirm window shows strong fresh demand. A+ /
  # smart-money / runner setups are exempt. Ships dark (enabled: false).
  anti_parabolic:
    enabled: false
    near_peak_ratio: 0.97
    weak_score_max: 9
    confirm_window_ms: 1500
    # Need at least (strong_upticks + 1) slices, else the reprieve can never trigger.
    confirm_slices: 4
    strong_upticks: 2
    strong_new_buyers: 3
  weights:
    # Audit 2026-06: was 4 — inflated weak devs into A+; serial ruggers kept +4 via SQL averages.
    dev_history_strong: 2
    dev_history_weak: 2
    dev_ranker_a_plus: 3
    dev_ranker_a: 1
    dev_ranker_bad: -3
    smart_wallets_3plus: 4
    smart_wallets_1plus: 1
    buyers_10plus: 2
    buyers_6plus: 1
    buyers_below_3: -2
    buy_to_sell_ratio_high: 1
    momentum_good: 2
    momentum_overheated: -3
    volume_ok: 1
    bundle_similar: -4
    bundle_identical: -5
    # Early-window tape (V3): buyer cadence + sell pressure / absorb / dumps
    buyer_velocity_persistent: 1
    buyer_velocity_fading: -2
    sell_pressure_high: -2
    absorb_strong: 2
    smart_early_exit_dump: -2
    repeat_dump_penalty: -1
  thresholds:
    dev_strong_min_coins: 5
    dev_strong_min_pnl_pct: 20.0
    buyers_high: 10
    buyers_mid: 6
    buyers_low: 4
    buy_to_sell_high: 1.7
    # Legacy: low band 4% (pre-V2). V2 A/B used 12% — set back to 12.0 when legacy_scoring: false.
    # momentum_good uses peak mcap in window vs first sample (not end-only).
    momentum_good_low_pct: 3.0
    momentum_good_high_pct: 30.0
    momentum_overheated_pct: 55.0
    volume_ok_sol: 12.0
    smart_wallet_3plus_min: 4
    smart_wallet_1plus_min: 1
    bundle_similar_ratio: 0.7
    bundle_identical_ratio: 0.5
    # Legacy default 0.05 (V2 used 0.10 for similar-cluster sensitivity).
    bundle_similar_tolerance: 0.05
  size:
    a_plus_sol: 0.4
    # Tier A: smaller than A+; operator cap must be >= a_plus_sol (see buy_config.amount_sol).
    a_sol: 0.3
    # Tier B — Fresh Dev Setup (MVP stats lane).
    b_sol: 0.2

  # Tier B — Fresh Dev Setup: experimental lane for devs with no creator history.
  # All continuation / anti-rug / bundle / late-entry protections stay active.
  tier_b:
    enabled: true
    min_smart_wallets: 0
    min_buyers: 10
    min_buy_volume_sol: 10.0
    min_velocity_pct: 5.0
    hot_fresh_override:
      enabled: true
      min_buyers: 25
      min_buy_volume_sol: 25.0
      min_velocity_pct: 100.0
    fresh_watchlist:
      enabled: true
      poll_interval_ms: 5000
      max_wait_ms: 30000
      max_concurrent: 50

# After our bot cliff exit (SL CRASH / deep SL / large tick drop), block this dev's
# new mints until expires_at (stored in dev_blacklist table).
dev_blacklist:
  enabled: true
  cooldown_secs: 604800
  min_pnl_pct_for_sl: -30.0
  min_tick_drop_pct: 40.0
  # Rug spikes → permanent ban (expires_at=0). Plain SL uses cooldown_secs only.
  permanent_min_tick_drop_pct: 55.0
  permanent_min_mcap_drop_pct: 60.0

# Strategy controller — risk caps applied at the InitiateBuy gate inside the
# position manager. None of these touch open positions.
strategy:
  max_open_positions: 3
  max_trades_per_day: 25
  max_daily_loss_sol: -2.0
  daily_profit_lock_sol: 4.0
  loss_streak_limit: 5
  loss_streak_pause_secs: 1800
  market_regime_pause: true
  market_regime_window: 10
  market_regime_loss_ratio: 0.8
  market_regime_pause_secs: 1800

# Persistent JSON state for dev_ranker and smart_money. Both are flushed
# atomically via tmp+rename every flush_every_secs.
persistence:
  dev_ranker_path: "/home/automata/state/dev_ranker.json"
  smart_money_path: "/home/automata/state/smart_money.json"
  learning_overrides_path: "/home/automata/state/learning_overrides.json"
  flush_every_secs: 30
  entity_ttl_secs: 172800

# Self-learning: logs closed trades + skipped mints to Postgres; periodically
# nudges scoring thresholds (merged at runtime, max ~±15% via merge clamps).
learning:
  enabled: true
  analyze_every_trades: 100
  analyze_interval_secs: 3600
  min_trades_for_update: 30

# Execution mode. Default: live (SolanaBroker). Demo = MockBroker (simulated).
# Live reads wallet from PRIVATE_KEY env, mainnet RPC from SOLANA_RPC_URL
# (or SOLANA_HTTP) env, and routes real buy/sell tx with the knobs below.
execution:
  mode: live            # demo | live
  live:
    slippage_bps: 500                   # 5%
    priority_fee_micro_lamports: 200000 # per CU (0 disables)
    compute_unit_limit: 200000          # 0 keeps cluster default
    max_retries: 3
    balance_refresh_secs: 10
    # Helius Gatekeeper (beta.helius-rpc.com) rejects sendTransaction preflight
    # (-32602 "not supported"). Use true for that HTTP endpoint; standard
    # mainnet.helius can use false if you want RPC simulation before send.
    skip_preflight: true

# Copy-trade wallets (private keys in env only — never put secrets here).
wallets:
  - id: wallet_1
    label: Main
    enabled: true
    private_key_env: PRIVATE_KEY
    size_sol: null
  - id: wallet_2
    label: Copy
    # Both wallets buy by default; set enabled false or omit PRIVATE_KEY_WALLET_2 to disable copy wallet.
    enabled: true
    private_key_env: PRIVATE_KEY_WALLET_2
    size_sol: null
    # Copy wallet only: larger than global scoring.size (wallet_1 uses tier sizes from scoring).
    tier_size:
      a_sol: 0.5
      a_plus_sol: 0.6